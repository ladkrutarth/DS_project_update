version: '3.8'

services:
  backend:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    environment:
      - PYTHONUNBUFFERED=1
    command: python api/main.py

  frontend:
    build: .
    ports:
      - "8502:8502"
    volumes:
      - .:/app
    environment:
      - VERISCAN_API_URL=http://backend:8000
    command: streamlit run streamlit_app.py --server.port 8502
    depends_on:
      - backend
